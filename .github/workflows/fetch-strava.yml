name: Fetch Strava Activities

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC every day
  workflow_dispatch:       # allow manual trigger from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit the JSON file back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch activities from Strava
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/fetch_strava.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/strava-activities.json
          git diff --cached --quiet \
            && echo "No changes." \
            || (git commit -m "Update Strava activity data [skip ci]" && git push)
